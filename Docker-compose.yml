services:
  # ======================
  # HADOOP MASTER
  # ======================
  master:
    image: nhom17
    container_name: master
    hostname: master
    ports:
      - "9870:9870"
      - "8089:8088"
      - "10001:10001"
    volumes:
      - ./data:/data:ro
      - ./src:/app/src:rw
      - .:/app
    networks:
      - hadoop_net
    tty: true
    stdin_open: true
    restart: always

  # ======================
  # HADOOP SLAVES
  # ======================
  slave1:
    image: nhom17
    container_name: slave1
    hostname: slave1
    networks:
      - hadoop_net
    restart: always

  slave2:
    image: nhom17
    container_name: slave2
    hostname: slave2
    networks:
      - hadoop_net
    restart: always

  # ======================
  # SUPERSET
  # ======================
  superset:
    image: apache/superset:latest
    container_name: superset
    user: "root"
    ports:
      - "8080:8088"
    networks:
      - hadoop_net
    volumes:
      - superset_home:/app/superset_home
    environment:
      - SUPERSET_SECRET_KEY=lakehouse_2026
    restart: always
    entrypoint: >
      sh -c "
        /app/.venv/bin/python -m ensurepip --upgrade &&
        /app/.venv/bin/python -m pip install --no-cache-dir pyhive thrift thrift_sasl pure-sasl &&
        /usr/bin/run-server.sh
      "

  # ======================
  # PREFECT (FIX CHUẨN NHẤT)
  # ======================
  prefect:
    image: prefecthq/prefect:2-python3.10
    container_name: prefect
    hostname: prefect
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - prefect_data:/root/.prefect
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
    networks:
      - hadoop_net
    depends_on:
      - master
    tty: true
    stdin_open: true
    restart: always
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y docker.io &&
        pip install --no-cache-dir pyhive thrift docker &&
        echo 'Docker version:' &&
        docker --version &&
        prefect server start --host 0.0.0.0 --port 4200
      "

networks:
  hadoop_net:
    driver: bridge

volumes:
  superset_home:
  prefect_data: