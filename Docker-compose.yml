services:
  # ======================
  # HADOOP MASTER
  # ======================
  master:
    image: nhom17
    container_name: master
    hostname: master
    ports:
      - "9870:9870"
      - "8089:8088"
      - "10001:10001"
    volumes:
      - ./data:/data:ro
      - ./src:/app/src:rw
      - .:/app
    networks:
      - hadoop_net
    tty: true
    stdin_open: true
    restart: always

  # ======================
  # HADOOP SLAVES
  # ======================
  slave1:
    image: nhom17
    container_name: slave1
    hostname: slave1
    networks:
      - hadoop_net
    restart: always

  slave2:
    image: nhom17
    container_name: slave2
    hostname: slave2
    networks:
      - hadoop_net
    restart: always

  # ======================
  # SUPERSET (AUTO INIT - FIX CHUẨN)
  # ======================
  superset:
    image: apache/superset:latest
    container_name: superset
    user: "root"
    ports:
      - "8080:8088"
    networks:
      - hadoop_net
    volumes:
      - superset_home:/app/superset_home
    environment:
      - SUPERSET_SECRET_KEY=lakehouse_2026
    restart: always
    entrypoint: >
      sh -c "
        echo 'Installing dependencies...' &&
        /app/.venv/bin/python -m ensurepip --upgrade &&
        /app/.venv/bin/python -m pip install --no-cache-dir pyhive thrift thrift_sasl pure-sasl &&
        echo 'Waiting for Superset...' &&
        sleep 20 &&
        echo 'Upgrading DB...' &&
        superset db upgrade &&
        echo 'Creating admin user...' &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@local.com --password admin || true &&
        echo 'Initializing Superset...' &&
        superset init &&
        echo 'Starting Superset...' &&
        /usr/bin/run-server.sh
      "

  # ======================
  # PREFECT (ỔN ĐỊNH API)
  # ======================
  prefect:
    image: prefecthq/prefect:2-python3.10
    container_name: prefect
    hostname: prefect
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - prefect_data:/root/.prefect
    working_dir: /app
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
    networks:
      - hadoop_net
    depends_on:
      - master
      - superset
    tty: true
    stdin_open: true
    restart: always
    command: >
      bash -c "
        pip install --no-cache-dir paramiko pyhive thrift &&
        echo 'Starting Prefect server...' &&
        prefect server start --host 0.0.0.0 --port 4200 &
        sleep 10 &&
        echo 'Prefect is ready!' &&
        tail -f /dev/null
      "

networks:
  hadoop_net:
    driver: bridge

volumes:
  superset_home:
  prefect_data:
